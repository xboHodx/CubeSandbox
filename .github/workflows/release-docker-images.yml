name: Release Docker Images

# Reusable pipeline for building and pushing release component images.
# GitHub-hosted runners build amd64 + arm64 and publish multi-arch manifests to
# GHCR and TCR int. The TCR int instance auto-syncs to TCR cn on Tencent Cloud,
# so no separate CN push job is needed. Add a component by extending the prepare
# job's component table and publish_manifests matrix below.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and push (e.g. v0.5.0)'
        required: true
        type: string
      ref:
        description: 'Git ref to build from (branch or tag; defaults to the branch you run from)'
        required: false
        type: string
        default: ''
      components:
        description: 'Comma-separated components to build, or "all" (cube-egress, cube-master, cube-api, cube-proxy, webui, cube-lifecycle-manager)'
        required: false
        type: string
        default: all
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to build and push'
        required: true
        type: string
      ref:
        description: 'Git ref to build from (defaults to the caller ref)'
        required: false
        type: string
        default: ''
      components:
        description: 'Comma-separated components to build, or "all"'
        required: false
        type: string
        default: all

concurrency:
  group: release-docker-images-${{ inputs.image_tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  CHECKOUT_REF: ${{ inputs.ref != '' && inputs.ref || github.ref }}
  OPENRESTY_BASE_IMAGE: cube-sandbox-image.tencentcloudcr.com/opensource/openresty:1.21.4.1-6-alpine-fat

jobs:
  verify_versions:
    name: Verify release image tags
    runs-on: ubuntu-latest
    if: github.repository == 'TencentCloud/CubeSandbox'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Check hard-coded image tags match the release tag
        run: scripts/bump-image.sh --check "${{ inputs.image_tag }}"

  prepare:
    name: Resolve component matrix
    runs-on: ubuntu-latest
    needs: verify_versions
    if: github.repository == 'TencentCloud/CubeSandbox'
    outputs:
      build: ${{ steps.filter.outputs.build }}
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - name: Filter components
        id: filter
        env:
          COMPONENTS: ${{ inputs.components }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.environ["COMPONENTS"].strip()
          if raw == "all":
              selected = None
          else:
              selected = {c.strip() for c in raw.split(",") if c.strip()}
              if not selected:
                  print("error: components is empty after parsing", file=sys.stderr)
                  sys.exit(1)

          known = {
              "cube-egress",
              "cube-master",
              "cube-api",
              "cube-proxy",
              "webui",
              "cube-lifecycle-manager",
          }
          if selected is not None:
              unknown = sorted(selected - known)
              if unknown:
                  print(f"error: unknown component(s): {', '.join(unknown)}", file=sys.stderr)
                  print(f"valid: {', '.join(sorted(known))}", file=sys.stderr)
                  sys.exit(1)

          def want(name: str) -> bool:
              return selected is None or name in selected

          defs = [
              {
                  "component": "cube-egress",
                  "image": "cube-egress",
                  "context": "CubeEgress",
                  "dockerfile": "CubeEgress/Dockerfile",
                  "cache_scope": "cube-egress",
              },
              {
                  "component": "cube-master",
                  "image": "cube-master",
                  "context": ".",
                  "dockerfile": "CubeMaster/Dockerfile",
                  "cache_scope": "cube-master",
              },
              {
                  "component": "cube-api",
                  "image": "cube-api",
                  "context": "CubeAPI",
                  "dockerfile": "CubeAPI/Dockerfile",
                  "cache_scope": "cube-api",
              },
              {
                  "component": "cube-proxy",
                  "image": "cube-proxy",
                  "context": "CubeProxy",
                  "dockerfile": "CubeProxy/Dockerfile",
                  "cache_scope": "cube-proxy",
              },
              {
                  "component": "webui",
                  "image": "webui",
                  "context": ".",
                  "dockerfile": "deploy/one-click/webui/Dockerfile",
                  "cache_scope": "webui",
              },
              {
                  "component": "cube-lifecycle-manager",
                  "image": "cube-lifecycle-manager",
                  "context": "cube-lifecycle-manager",
                  "dockerfile": "cube-lifecycle-manager/Dockerfile",
                  "cache_scope": "cube-lifecycle-manager",
              },
          ]
          arches = [
              {
                  "arch": "amd64",
                  "platform": "linux/amd64",
                  "runner": "ubuntu-latest",
              },
              {
                  "arch": "arm64",
                  "platform": "linux/arm64",
                  "runner": "ubuntu-24.04-arm",
              },
          ]

          build_include = []
          publish_include = []
          for item in defs:
              if not want(item["component"]):
                  continue
              publish_include.append(
                  {"component": item["component"], "image": item["image"]}
              )
              for arch in arches:
                  build_include.append({**item, **arch})

          if not build_include:
              print("error: no components selected for build", file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"build={json.dumps({'include': build_include})}\n")
              out.write(f"publish={json.dumps({'include': publish_include})}\n")
          PY

  build_images:
    name: ${{ matrix.component }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [verify_versions, prepare]
    if: github.repository == 'TencentCloud/CubeSandbox'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Cloud TCR (int)
        uses: docker/login-action@v3
        with:
          registry: cube-sandbox-int.tencentcloudcr.com
          username: ${{ secrets.TCR_INT_USERNAME }}
          password: ${{ secrets.TCR_INT_PASSWORD }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          # Push plain per-arch manifests (no provenance/SBOM attestations) so the
          # publish_manifests step can combine them into a single clean multi-arch
          # manifest list; attestations would add extra manifest entries that break
          # `docker buildx imagetools create`.
          provenance: false
          build-args: |
            CUBE_VERSION=${{ inputs.image_tag }}
            CUBE_COMMIT=${{ steps.meta.outputs.commit }}
            CUBE_BUILD_TIME=${{ steps.meta.outputs.build_time }}
            CUBE_PROXY_BASE_IMAGE=${{ env.OPENRESTY_BASE_IMAGE }}
            OPENRESTY_BASE_IMAGE=${{ env.OPENRESTY_BASE_IMAGE }}
          tags: |
            ghcr.io/tencentcloud/${{ matrix.image }}:${{ inputs.image_tag }}-${{ matrix.arch }}
            cube-sandbox-int.tencentcloudcr.com/cube-sandbox/${{ matrix.image }}:${{ inputs.image_tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}-${{ matrix.arch }}

  publish_manifests:
    name: ${{ matrix.component }} manifests
    runs-on: ubuntu-latest
    needs: [build_images, prepare]
    if: >-
      always() &&
      needs.build_images.result == 'success' &&
      github.repository == 'TencentCloud/CubeSandbox'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.publish) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Cloud TCR (int)
        uses: docker/login-action@v3
        with:
          registry: cube-sandbox-int.tencentcloudcr.com
          username: ${{ secrets.TCR_INT_USERNAME }}
          password: ${{ secrets.TCR_INT_PASSWORD }}

      - name: Resolve manifest tags
        id: tags
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          tags="${IMAGE_TAG}"
          if [[ "${IMAGE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="${tags} latest"
          fi
          echo "list=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Create multi-arch manifests
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_NAME: ${{ matrix.image }}
          # Bind step outputs to env vars instead of interpolating ${{ }} into the
          # script body, so no expression value can ever be parsed as shell. The
          # unquoted ${MANIFEST_TAGS} expansion below is deliberate word-splitting
          # into individual tags.
          MANIFEST_TAGS: ${{ steps.tags.outputs.list }}
        run: |
          for image in \
            "ghcr.io/tencentcloud/${IMAGE_NAME}" \
            "cube-sandbox-int.tencentcloudcr.com/cube-sandbox/${IMAGE_NAME}"; do
            for tag in ${MANIFEST_TAGS}; do
              docker buildx imagetools create -t "${image}:${tag}" \
                "${image}:${IMAGE_TAG}-amd64" \
                "${image}:${IMAGE_TAG}-arm64"
            done
          done
