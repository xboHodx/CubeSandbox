worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml;

    # Only send "Connection: upgrade" upstream for real WebSocket handshakes;
    # plain requests get an empty value so they are not mistaken for upgrades.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /cubeapi {
            return 308 /cubeapi/;
        }

        # Same-origin forward of sandbox traffic (incl. the OpenClaw gateway UI/wss)
        # to cube-proxy. Serving OpenClaw under the dashboard origin keeps its
        # localStorage in the same bucket the dashboard can clear, which is the
        # demo-time mitigation for OpenClaw WebSocket crosstalk. cube-proxy routes
        # by the /sandbox/<id>/<port>/ path, so the Host header is irrelevant here.
        location ^~ /sandbox/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 7206s;
            proxy_send_timeout 7206s;

            proxy_pass __SANDBOX_PROXY_UPSTREAM__;
        }

        location /cubeapi/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            proxy_pass __WEB_UI_UPSTREAM__/cubeapi/;
        }

        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
